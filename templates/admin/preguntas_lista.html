{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4 animate__animated animate__fadeIn">
        <div>
            <h1 class="fw-bold"><i class="bi bi-question-circle text-primary me-2"></i>Gestión de Preguntas</h1>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="{{ url_for('admin_dashboard') }}">Admin</a></li>
                    <li class="breadcrumb-item active">Preguntas</li>
                </ol>
            </nav>
        </div>
        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#nuevaPreguntaModal">
            <i class="bi bi-plus-lg me-1"></i> Nueva Pregunta
        </button>
    </div>

    <div class="card border-0 shadow-sm animate__animated animate__fadeInUp">
        <div class="table-responsive p-3">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th>Pregunta</th>
                        <th>Área Asociada</th>
                        <th class="text-end">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    {% for pregunta in preguntas %}
                    <tr>
                        <td>{{ pregunta.texto_pregunta }}</td>
                        <td><span class="badge bg-light text-primary border">{{ pregunta.area_profesional }}</span></td>
                        <td class="text-end">
                            <div class="btn-group">
                                <button class="btn btn-sm btn-outline-secondary" data-bs-toggle="modal" data-bs-target="#editarPreguntaModal{{ pregunta.id }}">
                                    <i class="bi bi-pencil"></i>
                                </button>
                                <form action="{{ url_for('eliminar_pregunta', id=pregunta.id) }}" method="POST" style="display:inline;" onsubmit="return confirm('¿Estás seguro de que deseas eliminar esta pregunta?')">
                                    <button type="submit" class="btn btn-sm btn-outline-danger">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>

                    <!-- Modal Editar Pregunta -->
                    <div class="modal fade" id="editarPreguntaModal{{ pregunta.id }}" tabindex="-1" aria-hidden="true">
                        <div class="modal-dialog">
                            <div class="modal-content border-0 shadow">
                                <form action="{{ url_for('editar_pregunta', id=pregunta.id) }}" method="POST">
                                    <div class="modal-header border-0 py-3">
                                        <h5 class="modal-title fw-bold">Editar Pregunta</h5>
                                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                                    </div>
                                    <div class="modal-body p-4">
                                        <div class="mb-3">
                                            <label class="form-label fw-bold">Texto de la Pregunta</label>
                                            <input type="text" name="texto_pregunta" class="form-control" value="{{ pregunta.texto_pregunta }}" required>
                                        </div>
                                        <div class="mb-0">
                                            <label class="form-label fw-bold">Área Profesional</label>
                                            <input type="text" name="area_profesional" class="form-control" value="{{ pregunta.area_profesional }}" required>
                                        </div>
                                    </div>
                                    <div class="modal-footer border-0">
                                        <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
                                        <button type="submit" class="btn btn-primary">Guardar Cambios</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal Nueva Pregunta -->
<div class="modal fade" id="nuevaPreguntaModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content border-0 shadow">
            <form action="{{ url_for('nueva_pregunta') }}" method="POST">
                <div class="modal-header border-0 py-3">
                    <h5 class="modal-title fw-bold">Agregar Nueva Pregunta</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Texto de la Pregunta</label>
                        <input type="text" name="texto_pregunta" class="form-control" placeholder="Ej: ¿Te gusta el dibujo técnico?" required>
                    </div>
                    <div class="mb-0">
                        <label class="form-label fw-bold">Área Profesional</label>
                        <input type="text" name="area_profesional" class="form-control" placeholder="Ej: Diseño" required>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Crear Pregunta</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
