{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4 animate__animated animate__fadeIn">
        <div>
            <h1 class="fw-bold"><i class="bi bi-mortarboard text-primary me-2"></i>Gestión de Carreras</h1>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="{{ url_for('admin_dashboard') }}">Admin</a></li>
                    <li class="breadcrumb-item active">Carreras</li>
                </ol>
            </nav>
        </div>
        <a href="{{ url_for('nueva_carrera') }}" class="btn btn-primary">
            <i class="bi bi-plus-lg me-1"></i> Nueva Carrera
        </a>
    </div>

    <div class="card border-0 shadow-sm animate__animated animate__fadeInUp">
        <div class="table-responsive p-3">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th>Nombre</th>
                        <th>Área Profesional</th>
                        <th>Descripción</th>
                        <th class="text-end">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    {% for carrera in carreras %}
                    <tr>
                        <td class="fw-bold">{{ carrera.nombre }}</td>
                        <td><span class="badge bg-light text-primary border">{{ carrera.area_profesional }}</span></td>
                        <td><small class="text-muted text-truncate d-inline-block" style="max-width: 300px;">{{ carrera.descripcion }}</small></td>
                        <td class="text-end">
                            <div class="btn-group">
                                <a href="{{ url_for('editar_carrera', id=carrera.id) }}" class="btn btn-sm btn-outline-secondary">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <form action="{{ url_for('eliminar_carrera', id=carrera.id) }}" method="POST" style="display:inline;" onsubmit="return confirm('¿Estás seguro de que deseas eliminar esta carrera?')">
                                    <button type="submit" class="btn btn-sm btn-outline-danger">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
