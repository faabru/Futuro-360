{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card border-0 shadow-sm animate__animated animate__fadeInUp">
                <div class="card-header bg-white py-4 border-0">
                    <h2 class="fw-bold mb-0 text-center">
                        {% if carrera %}Editar Carrera{% else %}Nueva Carrera{% endif %}
                    </h2>
                </div>
                <div class="card-body p-4">
                    <form method="POST">
                        <div class="mb-4">
                            <label for="nombre" class="form-label fw-bold">Nombre de la Carrera</label>
                            <input type="text" name="nombre" id="nombre" class="form-control" value="{{ carrera.nombre if carrera else '' }}" required placeholder="Ej: Ingeniería Informática">
                        </div>
                        
                        <div class="mb-4">
                            <label for="area_profesional" class="form-label fw-bold">Área Profesional</label>
                            <input type="text" name="area_profesional" id="area_profesional" class="form-control" value="{{ carrera.area_profesional if carrera else '' }}" required placeholder="Ej: Tecnología">
                        </div>

                        <div class="mb-4">
                            <label for="descripcion" class="form-label fw-bold">Descripción</label>
                            <textarea name="descripcion" id="descripcion" class="form-control" rows="5" required placeholder="Describe brevemente la carrera...">{{ carrera.descripcion if carrera else '' }}</textarea>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary px-4">
                                <i class="bi bi-save me-1"></i> Guardar Cambios
                            </button>
                            <a href="{{ url_for('admin_carreras') }}" class="btn btn-outline-secondary px-4">
                                Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
