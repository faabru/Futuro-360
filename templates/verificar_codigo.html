{% extends "base.html" %} 
{% block content %} 

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card shadow border-0 rounded-4">
        <div class="card-body p-5">

          <!-- Encabezado -->
          <div class="text-center mb-4">
            <div class="bg-primary bg-opacity-10 p-3 rounded-circle d-inline-block mb-3">
              <i class="bi bi-shield-check text-primary fs-1"></i>
            </div>
            <h2 class="fw-bold">Verificá tu identidad</h2>
            <p class="text-muted">
              Ingresá el código de 6 dígitos que enviamos a 
              <span class="text-dark fw-semibold">{{ email }}</span>
            </p>
          </div>

          <!-- Formulario de Código -->
          <form action="{{ url_for('verificar_codigo') }}" method="POST">
            <div class="d-flex justify-content-between mb-4 gap-2">
              {% for i in range(1, 7) %}
              <input type="text" name="d{{ i }}" class="form-control form-control-lg text-center fw-bold fs-2 digit-input" 
                     maxlength="1" pattern="\d" inputmode="numeric" required
                     style="width: 50px; height: 60px;">
              {% endfor %}
            </div>

            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-primary btn-lg rounded-3 py-3 fw-bold shadow-sm">
                Verificar Código
              </button>
            </div>
          </form>

          <!-- Reenviar código -->
          <div class="text-center mt-4 pt-3 border-top">
            <p class="mb-1 text-muted">¿No recibiste el código?</p>
            <a href="{{ url_for('recuperar_password') }}" class="text-decoration-none fw-semibold">
              Solicitar nuevo código
            </a>
          </div>

          <div class="text-center mt-3">
            <a href="{{ url_for('login') }}" class="text-muted text-decoration-none small">
              Volver al inicio de sesión
            </a>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>

<script>
// Script para saltar al siguiente input automáticamente
document.querySelectorAll('.digit-input').forEach((input, index, inputs) => {
    input.addEventListener('input', (e) => {
        if (e.target.value && index < inputs.length - 1) {
            inputs[index + 1].focus();
        }
    });

    input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !e.target.value && index > 0) {
            inputs[index - 1].focus();
        }
    });

    // Soporte para pegar el código completo
    input.addEventListener('paste', (e) => {
        const pasteData = e.clipboardData.getData('text').trim();
        if (pasteData.length === 6 && /^\d+$/.test(pasteData)) {
            inputs.forEach((inp, i) => {
                inp.value = pasteData[i];
            });
            inputs[5].focus();
            e.preventDefault();
        }
    });
});
</script>

{% endblock %}
