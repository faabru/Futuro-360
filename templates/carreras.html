{% extends 'base.html' %}

{% block content %}
<!-- SECCIÓN PRINCIPAL: GUÍA DE CARRERAS -->
<div class="container py-5">
    
    <!-- ENCABEZADO Y BÚSQUEDA -->
    <div class="row align-items-center mb-5">
        <div class="col-lg-6">
            <h1 class="display-4 fw-bold text-primary mb-3">Guía de Carreras 🎓</h1>
            <p class="lead text-muted">Explora y filtra las opciones académicas para tu futuro.</p>
        </div>
        <div class="col-lg-6">
            <div class="input-group input-group-lg shadow-sm">
                <span class="input-group-text bg-white border-0"><i class="bi bi-search"></i></span>
                <input type="text" id="careerSearch" class="form-control border-0" placeholder="Buscar carrera (ej: Ingeniería, Psicología)...">
            </div>
        </div>
    </div>

    <div class="row">
        <!-- FILTROS LATERALES -->
        <div class="col-lg-3 mb-4">
            <div class="section-card p-4 border-0 shadow-sm">
                <h5 class="fw-bold mb-4">Área Profesional</h5>
                <div class="list-group list-group-flush" id="areaFilters">
                    <button class="list-group-item list-group-item-action border-0 px-0 active rounded-3 mb-2" data-filter="all">Todas las áreas</button>
                    <button class="list-group-item list-group-item-action border-0 px-0 rounded-3 mb-2" data-filter="Tecnología">Tecnología</button>
                    <button class="list-group-item list-group-item-action border-0 px-0 rounded-3 mb-2" data-filter="Salud">Salud</button>
                    <button class="list-group-item list-group-item-action border-0 px-0 rounded-3 mb-2" data-filter="Salud Mental">Salud Mental</button>
                    <button class="list-group-item list-group-item-action border-0 px-0 rounded-3 mb-2" data-filter="Negocios">Negocios</button>
                    <button class="list-group-item list-group-item-action border-0 px-0 rounded-3" data-filter="Diseño">Diseño</button>
                </div>
            </div>
        </div>

        <!-- LISTADO DINÁMICO DE CARRERAS (READ) -->
        <div class="col-lg-9">
            <div class="row g-4" id="careerList">
                {% for carrera in carreras %}
                <div class="col-md-6 career-item" data-area="{{ carrera.area_profesional }}">
                    <div class="card h-100 border-0 shadow-sm rounded-4 overflow-hidden section-card p-0">
                        <!-- IMAGEN DE LA CARRERA -->
                        <img src="https://images.unsplash.com/photo-1541339907198-e08756ebafe3?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=80" class="card-img-top object-fit-cover" height="200" alt="{{ carrera.nombre }}">
                        
                        <!-- CUERPO DE LA TARJETA -->
                        <div class="card-body p-4">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <span class="badge bg-primary-subtle text-primary px-3 py-2 rounded-pill fw-bold">{{ carrera.area_profesional }}</span>
                            </div>
                            <h4 class="fw-bold mb-3 text-primary">{{ carrera.nombre }}</h4>
                            <p class="text-muted small mb-4 line-clamp-3">{{ carrera.descripcion }}</p>
                            
                            <!-- BOTÓN DE ACCIÓN: VER DETALLE -->
                            <div class="d-grid">
                                <a href="{{ url_for('detalle_carrera', carrera_id=carrera.id) }}" class="btn btn-outline-primary rounded-pill shadow-sm">Ver detalles</a>
                            </div>
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</div>

<!-- LÓGICA DE FILTRADO (JAVASCRIPT) -->
<script>
    const searchInput = document.getElementById('careerSearch');
    const careerItems = document.querySelectorAll('.career-item');
    const filterButtons = document.querySelectorAll('#areaFilters button');

    // Función principal de filtrado por búsqueda y categoría
    function filterCareers() {
        const query = searchInput.value.toLowerCase();
        const activeFilter = document.querySelector('#areaFilters .active').dataset.filter;

        careerItems.forEach(item => {
            const name = item.querySelector('h4').innerText.toLowerCase();
            const area = item.dataset.area;
            const matchesSearch = name.includes(query);
            const matchesFilter = activeFilter === 'all' || area === activeFilter;

            // Mostrar u ocultar según coincidan ambos filtros
            if (matchesSearch && matchesFilter) {
                item.style.display = 'block';
            } else {
                item.style.display = 'none';
            }
        });
    }

    // Escuchar cambios en la barra de búsqueda
    searchInput.addEventListener('input', filterCareers);

    // Escuchar clics en los botones de categoría
    filterButtons.forEach(btn => {
        btn.addEventListener('click', () => {
            filterButtons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            filterCareers();
        });
    });
</script>
{% endblock %}
