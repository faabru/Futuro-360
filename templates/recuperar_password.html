{% extends "base.html" %} 

{% block content %} 
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card shadow border-0 rounded-4">
        <div class="card-body p-5">

          <!-- Encabezado -->
          <div class="text-center mb-4">
            <div class="bg-primary bg-opacity-10 p-3 rounded-circle d-inline-block mb-3">
              <i class="bi bi-shield-lock text-primary fs-1"></i>
            </div>
            <h2 class="fw-bold">¿Olvidaste tu contraseña?</h2>
            <p class="text-muted">
              Ingresá tu correo electrónico y te enviaremos un código de verificación para restablecerla.
            </p>
          </div>

          <!-- Formulario -->
          <form action="{{ url_for('recuperar_password') }}" method="POST">
            <div class="mb-4">
              <label for="email" class="form-label fw-semibold">Correo Electrónico</label>
              <div class="input-group">
                <span class="input-group-text bg-light border-end-0">
                  <i class="bi bi-envelope text-muted"></i>
                </span>
                <input type="email" name="email" id="email" 
                       class="form-control bg-light border-start-0 ps-0" 
                       placeholder="tu@email.com" required>
              </div>
            </div>

            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-primary btn-lg rounded-3 py-3 fw-bold shadow-sm">
                Enviar Código
              </button>
            </div>
          </form>

          <!-- Enlaces de navegación -->
          <div class="text-center mt-4">
            <a href="{{ url_for('login') }}" class="text-muted text-decoration-none small">
              <i class="bi bi-arrow-left me-1"></i> Volver al inicio de sesión
            </a>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
