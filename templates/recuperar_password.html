{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-lg animate__animated animate__zoomIn">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-shield-lock text-primary display-4"></i>
                        <h2 class="fw-bold mt-3">¿Olvidaste tu contraseña?</h2>
                        <p class="text-muted">Ingresa tu correo electrónico y te enviaremos las instrucciones para restablecerla.</p>
                    </div>
                    
                    <form action="{{ url_for('recuperar_password') }}" method="POST">
                        <div class="mb-4">
                            <label for="email" class="form-label fw-bold">Correo Electrónico</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope text-muted"></i></span>
                                <input type="email" name="email" id="email" class="form-control bg-light border-start-0" placeholder="ejemplo@correo.com" required>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold mb-3">
                            ENVIAR INSTRUCCIONES
                        </button>
                        
                        <div class="text-center">
                            <a href="{{ url_for('login') }}" class="text-decoration-none small">
                                <i class="bi bi-arrow-left me-1"></i> Volver al inicio de sesión
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
