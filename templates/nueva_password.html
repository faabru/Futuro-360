{% extends "base.html" %} 
{% block content %} 

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card shadow border-0 rounded-4">
        <div class="card-body p-5">

          <!-- Encabezado -->
          <div class="text-center mb-4">
            <div class="bg-success bg-opacity-10 p-3 rounded-circle d-inline-block mb-3">
              <i class="bi bi-key text-success fs-1"></i>
            </div>
            <h2 class="fw-bold">Nueva contraseña</h2>
            <p class="text-muted">
              Creá una contraseña segura de al menos 8 caracteres.
            </p>
          </div>

          <!-- Formulario -->
          <form action="{{ url_for('nueva_password') }}" method="POST">

            <div class="mb-3">
              <label class="form-label fw-semibold">Nueva contraseña</label>
              <div class="input-group">
                <span class="input-group-text bg-light border-end-0">
                  <i class="bi bi-lock text-muted"></i>
                </span>
                <input type="password" name="password_nueva" id="password_nueva" 
                       class="form-control bg-light border-start-0 ps-0" 
                       placeholder="••••••••" required minlength="8">
                <button class="btn btn-outline-secondary border-start-0" type="button" onclick="togglePassword('password_nueva')">
                  <i class="bi bi-eye" id="toggle_password_nueva"></i>
                </button>
              </div>
              <div class="form-text mt-2" id="password-strength">
                <!-- Se puede agregar un medidor de fuerza aquí -->
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label fw-semibold">Confirmar contraseña</label>
              <div class="input-group">
                <span class="input-group-text bg-light border-end-0">
                  <i class="bi bi-lock-check text-muted"></i>
                </span>
                <input type="password" name="password_confirmar" id="password_confirmar" 
                       class="form-control bg-light border-start-0 ps-0" 
                       placeholder="••••••••" required>
                <button class="btn btn-outline-secondary border-start-0" type="button" onclick="togglePassword('password_confirmar')">
                  <i class="bi bi-eye" id="toggle_password_confirmar"></i>
                </button>
              </div>
            </div>

            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-success btn-lg rounded-3 py-3 fw-bold shadow-sm">
                Cambiar Contraseña
              </button>
            </div>

          </form>

        </div>
      </div>
    </div>
  </div>
</div>

<script>
function togglePassword(inputId) {
    const input = document.getElementById(inputId);
    const icon = document.getElementById('toggle_' + inputId);
    if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('bi-eye', 'bi-eye-slash');
    } else {
        input.type = 'password';
        icon.classList.replace('bi-eye-slash', 'bi-eye');
    }
}
</script>

{% endblock %}
