{% extends 'base.html' %}

{% block content %}
<!-- SECCIÓN PRINCIPAL: PERFIL DE USUARIO (CRUD) -->
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow p-4 mt-5 border-0">
            
            <!-- ENCABEZADO DEL PERFIL -->
            <h2 class="text-center mb-4 text-primary fw-bold">Mi Perfil</h2>
            
            <!-- FORMULARIO DE ACTUALIZACIÓN (UPDATE) -->
            <form action="{{ url_for('perfil') }}" method="POST">
                <!-- CAMPO: NOMBRE -->
                <div class="mb-3">
                    <label for="nombre" class="form-label fw-semibold">Nombre</label>
                    <input type="text" class="form-control" id="nombre" name="nombre" value="{{ user.nombre }}" required>
                </div>
                
                <!-- CAMPO: CORREO ELECTRÓNICO -->
                <div class="mb-3">
                    <label for="email" class="form-label fw-semibold">Correo Electrónico</label>
                    <input type="email" class="form-control" id="email" name="email" value="{{ user.email }}" required>
                </div>
                
                <!-- BOTÓN DE ACCIÓN: ACTUALIZAR -->
                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-primary btn-lg shadow-sm">Actualizar Información</button>
                </div>
            </form>
            
            <hr class="my-5">
            
            <!-- SECCIÓN PELIGROSA: ELIMINAR CUENTA (DELETE) -->
            <div class="text-center">
                <p class="text-danger small mb-3">Si eliminas tu cuenta, todos tus resultados se borrarán permanentemente.</p>
                <form action="{{ url_for('eliminar_usuario') }}" method="POST" onsubmit="return confirm('¿Estás seguro de eliminar tu cuenta? Esta acción es irreversible.');">
                    <button type="submit" class="btn btn-outline-danger btn-sm">Eliminar mi Cuenta</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
