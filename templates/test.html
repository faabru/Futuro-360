{% extends 'base.html' %}
{% block content %}

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card border-0 shadow-lg animate__animated animate__fadeIn">
                <div class="card-body p-5">
                    <!-- Progreso -->
                    <div class="mb-5">
                        <div class="d-flex justify-content-between mb-2">
                            <span class="text-muted small fw-bold" id="progress-text">Pregunta 1 de ...</span>
                            <span class="text-primary small fw-bold" id="progress-percent">0%</span>
                        </div>
                        <div class="progress" style="height: 8px; border-radius: 10px;">
                            <div id="progress-bar" class="progress-bar progress-bar-striped progress-bar-animated bg-primary" role="progressbar" style="width: 0%"></div>
                        </div>
                    </div>

                    <!-- Contenedor de Pregunta -->
                    <div id="test-content">
                        <h2 class="fw-bold mb-4" id="question-text">Cargando pregunta...</h2>
                        <div id="options-container" class="d-grid gap-3">
                            <!-- Las opciones se cargarán aquí -->
                        </div>
                    </div>

                    <!-- Botón de Confirmar -->
                    <div class="mt-5 text-end">
                        <button id="next-btn" class="btn btn-primary btn-lg px-5 rounded-pill shadow-sm fw-bold" disabled>
                            Confirmar <i class="bi bi-arrow-right ms-2"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Formulario oculto para el envío final -->
<form id="final-form" action="{{ url_for('test') }}" method="POST" style="display: none;">
</form>

<style>
    .option-btn { 
        border: 2px solid #f0f0f0 !important; 
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        background-color: white;
        color: #333;
    }
    .option-btn:hover { 
        background-color: #f8f9fa; 
        border-color: #dee2e6 !important;
        transform: translateY(-2px); 
    }
    .option-btn.active { 
        background-color: #f0f7ff; 
        border-color: #0d6efd !important; 
        box-shadow: 0 4px 12px rgba(13, 110, 253, 0.15);
    }
    .option-circle { 
        width: 22px; 
        height: 22px; 
        border: 2px solid #dee2e6; 
        border-radius: 50%; 
        background: white; 
        flex-shrink: 0; 
        transition: all 0.2s ease;
    }
    .option-btn.active .option-circle { 
        border-color: #0d6efd; 
        background: radial-gradient(#0d6efd 50%, white 52%); 
    }
    #question-text {
        color: #2d3436;
        line-height: 1.4;
    }
</style>

<script>
    // Inyectamos el JSON de las preguntas
    const preguntas = {{ preguntas_json | safe }};
    let currentStep = 0;
    const answers = {};

    const questionText = document.getElementById('question-text');
    const optionsContainer = document.getElementById('options-container');
    const nextBtn = document.getElementById('next-btn');
    const progressBar = document.getElementById('progress-bar');
    const progressText = document.getElementById('progress-text');
    const progressPercent = document.getElementById('progress-percent');
    const finalForm = document.getElementById('final-form');

    function loadQuestion() {
        if (currentStep >= preguntas.length) {
            submitTest();
            return;
        }

        const q = preguntas[currentStep];
        
        // Animación de salida y entrada
        const testContent = document.getElementById('test-content');
        testContent.classList.remove('animate__fadeInUp');
        testContent.classList.add('animate__fadeOutDown');

        setTimeout(() => {
            questionText.innerText = q.texto_pregunta;
            optionsContainer.innerHTML = '';
            nextBtn.disabled = true;

            // Actualizar progreso
            const percent = Math.round((currentStep / preguntas.length) * 100);
            progressBar.style.width = `${percent}%`;
            progressText.innerText = `Pregunta ${currentStep + 1} de ${preguntas.length}`;
            progressPercent.innerText = `${percent}%`;

            q.opciones.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'btn option-btn text-start p-3 rounded-3 animate__animated animate__fadeInUp';
                btn.style.animationDelay = `${index * 0.1}s`;
                btn.innerHTML = `
                    <div class="d-flex align-items-center">
                        <div class="option-circle me-3"></div>
                        <span class="fw-medium">${opt.texto}</span>
                    </div>
                `;
                
                btn.onclick = () => {
                    document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    answers[q.id] = opt.area;
                    nextBtn.disabled = false;
                };
                
                optionsContainer.appendChild(btn);
            });

            testContent.classList.remove('animate__fadeOutDown');
            testContent.classList.add('animate__fadeInUp');
        }, 300);
    }

    nextBtn.onclick = () => {
        currentStep++;
        loadQuestion();
    };

    function submitTest() {
        // Mostrar estado de carga final
        document.getElementById('test-content').innerHTML = `
            <div class="text-center py-5">
                <div class="spinner-border text-primary mb-3" role="status"></div>
                <h4 class="fw-bold">Procesando tus resultados...</h4>
            </div>
        `;
        nextBtn.style.display = 'none';

        // Crear inputs ocultos en el form final
        for (const [id, area] of Object.entries(answers)) {
            const input = document.createElement('input');
            input.type = 'hidden';
            input.name = id;
            input.value = area;
            finalForm.appendChild(input);
        }
        
        setTimeout(() => {
            finalForm.submit();
        }, 1000);
    }

    // Inicializar el test
    loadQuestion();
</script>

{% endblock %}
